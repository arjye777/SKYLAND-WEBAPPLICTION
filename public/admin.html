<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyland Admin · Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --primary-blue: #0a2f6c;
  --light-blue: #e6f0ff;
  --white: #ffffff;
  --dark-blue: #041e3d;
  --gray: #4a5568;
  --border-light: #cbd5e1;
  --success: #2e7d32;
  --warning: #ed6c02;
  --error: #d32f2f;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: 'Segoe UI', Roboto, sans-serif;
  background: var(--light-blue);
  color: var(--dark-blue);
}
nav {
  background: var(--white);
  border-bottom: 1px solid var(--border-light);
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
}
.logo {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--primary-blue);
}
.nav-btns {
  display: flex;
  gap: 12px;
}
.btn {
  padding: 8px 22px;
  border-radius: 40px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: 0.2s;
}
.btn-primary {
  background: var(--primary-blue);
  color: white;
}
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--primary-blue);
  color: var(--primary-blue);
}
.btn-danger {
  background: var(--error);
  color: white;
}
.dashboard {
  padding: 28px 32px;
  max-width: 1400px;
  margin: 0 auto;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}
.stat-card {
  background: white;
  border-radius: 28px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.03);
  border: 1px solid var(--border-light);
}
.stat-number {
  font-size: 2.4rem;
  font-weight: 800;
  color: var(--primary-blue);
}
.stat-label {
  color: var(--gray);
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.charts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 40px;
}
.chart-card {
  background: white;
  border-radius: 28px;
  padding: 20px;
  border: 1px solid var(--border-light);
}
.chart-card h3 {
  margin-bottom: 16px;
  color: var(--primary-blue);
}
.section {
  background: white;
  border-radius: 28px;
  padding: 24px;
  margin-bottom: 32px;
  border: 1px solid var(--border-light);
}
.section h2 {
  color: var(--primary-blue);
  margin-bottom: 20px;
  font-size: 1.3rem;
}
table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  padding: 12px 8px;
  text-align: left;
  border-bottom: 1px solid var(--border-light);
}
th {
  color: var(--primary-blue);
  font-weight: 600;
}
.status-badge {
  padding: 4px 12px;
  border-radius: 30px;
  font-size: 0.75rem;
  font-weight: bold;
  display: inline-block;
}
.status-confirmed { background: #e8f5e9; color: #2e7d32; }
.status-pending { background: #fff3e0; color: #ed6c02; }
.status-cancelled { background: #ffebee; color: #c62828; }
button.small {
  padding: 4px 12px;
  font-size: 0.75rem;
  border-radius: 30px;
  margin: 0 4px;
}
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.modal.open { display: flex; }
.modal-content {
  background: white;
  border-radius: 32px;
  padding: 28px;
  width: 90%;
  max-width: 500px;
}
.filter-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.filter-bar input, .filter-bar select {
  padding: 8px 12px;
  border-radius: 30px;
  border: 1px solid var(--border-light);
}
footer {
  background: white;
  border-top: 1px solid var(--border-light);
  padding: 24px;
  text-align: center;
  font-size: 0.8rem;
  color: var(--gray);
  margin-top: 40px;
}
</style>
</head>
<body>

<nav>
  <div class="logo">SKYLAND · ADMIN</div>
  <div class="nav-btns">
    <span id="admin-name" style="font-weight:600;"></span>
    <button class="btn btn-outline" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="dashboard" id="admin-dashboard" style="display: none;">
  <!-- STATS CARDS -->
  <div class="stats-grid" id="stats-cards"></div>

  <!-- CHARTS -->
  <div class="charts-row">
    <div class="chart-card"><h3>📅 Daily Revenue (Last 7 days)</h3><canvas id="revenueChart"></canvas></div>
    <div class="chart-card"><h3>🛏️ Bookings by Room Type</h3><canvas id="roomTypeChart"></canvas></div>
  </div>

  <!-- BOOKINGS MANAGEMENT -->
  <div class="section">
    <h2>📋 All Bookings</h2>
    <div class="filter-bar">
      <input type="date" id="filter-from" placeholder="From">
      <input type="date" id="filter-to" placeholder="To">
      <select id="filter-status"><option value="">All Status</option><option>Confirmed</option><option>Pending</option><option>Cancelled</option></select>
      <button class="btn btn-primary small" onclick="loadBookings()">Filter</button>
      <button class="btn btn-outline small" onclick="exportCSV()">Export CSV</button>
    </div>
    <div style="overflow-x: auto;"><table id="bookings-table"><thead><tr><th>ID</th><th>Customer</th><th>Room</th><th>Bed</th><th>Check-in</th><th>Check-out</th><th>Add-ons</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead><tbody></tbody></table></div>
  </div>

  <!-- MENU MANAGEMENT -->
  <div class="section">
    <h2>🍽️ Menu Items</h2>
    <button class="btn btn-primary small" onclick="showAddMenuItem()">+ Add Item</button>
    <div style="margin-top: 16px; overflow-x: auto;"><table id="menu-table"><thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Description</th><th>Actions</th></tr></thead><tbody></tbody></table></div>
  </div>

  <!-- REQUESTS -->
  <div class="section">
    <h2>📝 Customer Requests</h2>
    <table id="requests-table"><thead><tr><th>Customer</th><th>Type</th><th>Details</th><th>Status</th><th>Action</th></tr></thead><tbody></tbody></table>
  </div>
</div>

<div id="login-panel" style="max-width: 400px; margin: 100px auto; background: white; padding: 32px; border-radius: 32px;">
  <h2 style="color: var(--primary-blue);">Admin Login</h2>
  <div class="fg"><label>Email</label><input type="email" id="admin-email" placeholder="admin@skyland.com"></div>
  <div class="fg"><label>Password</label><input type="password" id="admin-pass" placeholder="••••••"></div>
  <button class="btn btn-primary" style="width:100%;" onclick="adminLogin()">Sign In</button>
</div>

<!-- MODAL for menu edit/add -->
<div id="menuModal" class="modal">
  <div class="modal-content">
    <h3 id="menuModalTitle">Add Menu Item</h3>
    <div class="fg"><label>Name</label><input id="menu-name"></div>
    <div class="fg"><label>Category</label><input id="menu-category"></div>
    <div class="fg"><label>Price (₱)</label><input type="number" id="menu-price"></div>
    <div class="fg"><label>Description</label><textarea id="menu-desc"></textarea></div>
    <div class="fg"><label>Icon (emoji)</label><input id="menu-icon" placeholder="🍽️"></div>
    <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;">
      <button class="btn btn-outline" onclick="closeMenuModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveMenuItem()">Save</button>
    </div>
  </div>
</div>

<script>
const API = '';
let revenueChart, roomTypeChart;
let currentEditId = null;

async function api(method, url, body) {
  const opts = { method, headers: {'Content-Type':'application/json'}, credentials:'include' };
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(API+url, opts);
  return r.json();
}

async function adminLogin() {
  const email = document.getElementById('admin-email').value;
  const password = document.getElementById('admin-pass').value;
  const r = await api('POST','/api/admin/login',{email,password});
  if(r.ok) {
    document.getElementById('admin-name').innerText = 'Admin';
    document.getElementById('login-panel').style.display = 'none';
    document.getElementById('admin-dashboard').style.display = 'block';
    loadDashboard();
  } else alert('Login failed');
}
async function logout() {
  await api('POST','/api/admin/logout');
  location.reload();
}

async function loadDashboard() {
  await loadStats();
  await loadBookings();
  await loadMenu();
  await loadRequests();
}

async function loadStats() {
  const r = await api('GET','/api/admin/stats');
  if(!r.ok) return;
  const stats = r.stats;
  document.getElementById('stats-cards').innerHTML = `
    <div class="stat-card"><div class="stat-number">₱${(stats.total_revenue||0).toLocaleString()}</div><div class="stat-label">Total Revenue</div></div>
    <div class="stat-card"><div class="stat-number">${stats.total_bookings||0}</div><div class="stat-label">Total Bookings</div></div>
    <div class="stat-card"><div class="stat-number">${stats.active_bookings||0}</div><div class="stat-label">Active/Confirmed</div></div>
    <div class="stat-card"><div class="stat-number">${stats.total_customers||0}</div><div class="stat-label">Customers</div></div>
  `;
  // Revenue chart (last 7 days)
  const revData = await api('GET','/api/admin/analytics/daily-revenue');
  if(revData.ok && revenueChart) revenueChart.destroy();
  const ctx = document.getElementById('revenueChart').getContext('2d');
  revenueChart = new Chart(ctx, {
    type: 'line',
    data: { labels: revData.dates || [], datasets: [{ label: 'Revenue (₱)', data: revData.revenues || [], borderColor: '#0a2f6c', tension: 0.3 }] }
  });
  // Room type bookings
  const roomData = await api('GET','/api/admin/analytics/room-breakdown');
  if(roomData.ok && roomTypeChart) roomTypeChart.destroy();
  const ctx2 = document.getElementById('roomTypeChart').getContext('2d');
  roomTypeChart = new Chart(ctx2, {
    type: 'doughnut',
    data: { labels: roomData.labels || [], datasets: [{ data: roomData.counts || [], backgroundColor: ['#0a2f6c','#2c5282','#4a6fa5','#6b8cae'] }] }
  });
}

async function loadBookings() {
  const from = document.getElementById('filter-from').value;
  const to = document.getElementById('filter-to').value;
  const status = document.getElementById('filter-status').value;
  let url = '/api/admin/bookings?';
  if(from) url += `from=${from}&`;
  if(to) url += `to=${to}&`;
  if(status) url += `status=${status}`;
  const r = await api('GET', url);
  const tbody = document.querySelector('#bookings-table tbody');
  if(!r.bookings) { tbody.innerHTML = '<tr><td colspan="10">No bookings</td></tr>'; return; }
  tbody.innerHTML = r.bookings.map(b => `
    <tr>
      <td>${b.id?.slice(-6)}</td><td>${b.customer_name || '—'}</td><td>${b.room}</td><td>${b.bed_type || 'Twin/Double'}</td>
      <td>${b.checkin}</td><td>${b.checkout}</td>
      <td>${(b.fridge_requested?'🧊 Fridge ':'')} ${(b.extra_bed_requested?'🛏️ Extra Bed':'')}</td>
      <td>₱${Number(b.total_price).toLocaleString()}</td>
      <td><select onchange="updateBookingStatus('${b.id}', this.value)" class="status-badge status-${b.status?.toLowerCase()}"><option ${b.status==='Confirmed'?'selected':''}>Confirmed</option><option ${b.status==='Pending'?'selected':''}>Pending</option><option ${b.status==='Cancelled'?'selected':''}>Cancelled</option></select></td>
      <td><button class="btn btn-outline small" onclick="viewBookingDetails('${b.id}')">View</button></td>
    </tr>
  `).join('');
}
async function updateBookingStatus(id, newStatus) {
  await api('PUT','/api/admin/bookings/'+id, {status: newStatus});
  loadBookings(); loadStats();
}
async function viewBookingDetails(id) { alert(`Booking details:\nID: ${id}\nUse admin panel to edit.`); }

async function loadMenu() {
  const r = await api('GET','/api/menu');
  const tbody = document.querySelector('#menu-table tbody');
  if(!r.items) return;
  tbody.innerHTML = r.items.map(item => `
    <tr>
      <td>${item.icon||'🍽️'} ${item.name}</td><td>${item.category}</td><td>₱${item.price}</td><td>${item.description}</td>
      <td><button class="btn btn-outline small" onclick="editMenuItem('${item._id}')">Edit</button> <button class="btn btn-danger small" onclick="deleteMenuItem('${item._id}')">Delete</button></td>
    </tr>
  `).join('');
}
function showAddMenuItem() { currentEditId = null; document.getElementById('menuModalTitle').innerText = 'Add Menu Item'; document.getElementById('menu-name').value = ''; document.getElementById('menu-category').value = ''; document.getElementById('menu-price').value = ''; document.getElementById('menu-desc').value = ''; document.getElementById('menu-icon').value = ''; document.getElementById('menuModal').classList.add('open'); }
function closeMenuModal() { document.getElementById('menuModal').classList.remove('open'); }
async function editMenuItem(id) {
  const r = await api('GET','/api/menu');
  const item = r.items.find(i => i._id === id);
  if(item) {
    currentEditId = id;
    document.getElementById('menuModalTitle').innerText = 'Edit Menu Item';
    document.getElementById('menu-name').value = item.name;
    document.getElementById('menu-category').value = item.category;
    document.getElementById('menu-price').value = item.price;
    document.getElementById('menu-desc').value = item.description;
    document.getElementById('menu-icon').value = item.icon || '';
    document.getElementById('menuModal').classList.add('open');
  }
}
async function saveMenuItem() {
  const data = {
    name: document.getElementById('menu-name').value,
    category: document.getElementById('menu-category').value,
    price: parseFloat(document.getElementById('menu-price').value),
    description: document.getElementById('menu-desc').value,
    icon: document.getElementById('menu-icon').value
  };
  if(currentEditId) await api('PUT','/api/admin/menu/'+currentEditId, data);
  else await api('POST','/api/admin/menu', data);
  closeMenuModal();
  loadMenu();
}
async function deleteMenuItem(id) { if(confirm('Delete menu item?')) await api('DELETE','/api/admin/menu/'+id); loadMenu(); }

async function loadRequests() {
  const r = await api('GET','/api/admin/requests');
  const tbody = document.querySelector('#requests-table tbody');
  tbody.innerHTML = r.requests.map(req => `
    <tr>
      <td>${req.customer_name||'Guest'}</td><td>${req.type}</td><td>${req.detail}</td>
      <td><span class="status-badge ${req.status==='Resolved'?'status-confirmed':'status-pending'}">${req.status}</span></td>
      <td><button class="btn btn-primary small" onclick="resolveRequest('${req._id}')">Resolve</button></td>
    </tr>
  `).join('');
}
async function resolveRequest(id) { await api('PUT','/api/admin/requests/'+id, {status:'Resolved'}); loadRequests(); }

function exportCSV() {
  const rows = document.querySelectorAll('#bookings-table tbody tr');
  let csv = 'ID,Customer,Room,Bed,Check-in,Check-out,Add-ons,Total,Status\n';
  rows.forEach(row => {
    const cols = row.querySelectorAll('td');
    if(cols.length) csv += [...cols].slice(0,8).map(cell => cell.innerText).join(',') + '\n';
  });
  const blob = new Blob([csv], {type: 'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bookings.csv';
  a.click();
}
window.onload = () => { /* check session */ };
</script>
</body>
</html>
