<!-- CHATBOT BUTTON & WINDOW -->
<button class="chat-btn" onclick="toggleChat()" title="Chat with Skyland Assistant">💬</button>

<div class="chat-win" id="chatbot">
  <div class="chat-hd">
    <div>
      <h4>🤖 Skyland Assistant</h4>
      <span>● Online 24/7</span>
    </div>
    <button onclick="toggleChat()" style="background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;padding:0;width:24px;height:24px">✕</button>
  </div>
  <div class="chat-msgs" id="chat-msgs">
    <div class="msg bot">
      Hello! 👋 <b>Welcome to Skyland Hotel</b>!<br><br>
      I'm your AI assistant. I can help with:<br>
      • 🛏️ Room bookings & pricing<br>
      • 🍽️ Restaurant & dining<br>
      • 💆 Spa & wellness<br>
      • 🏊 Facilities & amenities<br>
      • 📝 Special requests<br>
      • 📞 Contact info<br><br>
      <b>What can I help you with?</b>
    </div>
  </div>
  <div class="chat-inp">
    <input 
      type="text" 
      id="chat-in" 
      placeholder="Ask me anything..." 
      onkeydown="if(event.key==='Enter'){sendChat();event.preventDefault()}"
      autocomplete="off"
    >
    <button onclick="sendChat()" style="background:var(--gold);border:none;border-radius:10px;padding:10px 16px;cursor:pointer;font-size:1.1rem;transition:all .2s" onmouseover="this.opacity='0.8'" onmouseout="this.opacity='1'">➤</button>
  </div>
</div>

<!-- CHATBOT SCRIPT -->
<script>
// ============= CHATBOT FUNCTIONALITY =============

let chatHistory = [];
let chatOpen = false;

// Initialize on page load
document.addEventListener('DOMContentLoaded', () => {
  loadChatHistory();
  setupChatListeners();
});

// Setup event listeners
function setupChatListeners() {
  const chatInput = document.getElementById('chat-in');
  if (chatInput) {
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendChat();
      }
    });
  }
}

// Toggle chat window
function toggleChat() {
  const chatWin = document.getElementById('chatbot');
  chatOpen = !chatOpen;
  
  if (chatOpen) {
    chatWin.classList.add('open');
    setTimeout(() => document.getElementById('chat-in').focus(), 100);
  } else {
    chatWin.classList.remove('open');
  }
}

// Send chat message
async function sendChat() {
  const input = document.getElementById('chat-in');
  const message = input.value.trim();
  
  if (!message) return;
  
  // Add user message immediately
  addMessage(message, 'user');
  input.value = '';
  
  // Show typing indicator
  showTypingIndicator();
  
  try {
    // Send to backend
    const response = await fetch('/api/chatbot/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })
    });
    
    const result = await response.json();
    removeTypingIndicator();
    
    if (result.ok) {
      // Add bot response with delay
      setTimeout(() => {
        addMessage(result.reply, 'bot');
        saveChatHistory();
      }, 300);
    } else {
      addMessage('⚠️ Sorry, an error occurred. Please try again.', 'bot');
    }
  } catch (error) {
    console.error('Chat error:', error);
    removeTypingIndicator();
    addMessage('🔌 Connection error. Please check your internet.', 'bot');
  }
}

// Add message to display
function addMessage(text, type) {
  const chatMsgs = document.getElementById('chat-msgs');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg ' + type;
  msgDiv.textContent = text;
  
  chatMsgs.appendChild(msgDiv);
  chatMsgs.scrollTop = chatMsgs.scrollHeight;
  
  chatHistory.push({ text, type, timestamp: new Date().toLocaleTimeString() });
}

// Show typing indicator
function showTypingIndicator() {
  const chatMsgs = document.getElementById('chat-msgs');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'msg bot typing';
  typingDiv.id = 'typing-indicator';
  typingDiv.innerHTML = '<span>●</span><span>●</span><span>●</span>';
  typingDiv.style.cssText = 'display:flex;gap:4px;align-items:center;padding:11px 15px';
  
  chatMsgs.appendChild(typingDiv);
  chatMsgs.scrollTop = chatMsgs.scrollHeight;
}

// Remove typing indicator
function removeTypingIndicator() {
  const typingDiv = document.getElementById('typing-indicator');
  if (typingDiv) typingDiv.remove();
}

// Save chat to local storage
function saveChatHistory() {
  try {
    localStorage.setItem('skylandChatHistory', JSON.stringify(chatHistory));
  } catch (e) {
    console.error('Error saving chat history:', e);
  }
}

// Load chat from local storage
function loadChatHistory() {
  try {
    const saved = localStorage.getItem('skylandChatHistory');
    if (saved) {
      chatHistory = JSON.parse(saved);
      // Display saved messages
      chatHistory.forEach(msg => {
        const chatMsgs = document.getElementById('chat-msgs');
        if (chatMsgs && msg.type !== 'bot') return; // Only load bot messages from history
        if (chatMsgs) {
          const msgDiv = document.createElement('div');
          msgDiv.className = 'msg ' + msg.type;
          msgDiv.textContent = msg.text;
          chatMsgs.appendChild(msgDiv);
        }
      });
    }
  } catch (e) {
    console.error('Error loading chat history:', e);
  }
}

// Clear chat history
function clearChatHistory() {
  chatHistory = [];
  localStorage.removeItem('skylandChatHistory');
  const chatMsgs = document.getElementById('chat-msgs');
  if (chatMsgs) {
    chatMsgs.innerHTML = '<div class="msg bot">Hello! 👋 Chat history cleared. How can I help you?</div>';
  }
}

// Add typing animation CSS
const style = document.createElement('style');
style.textContent = `
  .msg.typing span {
    animation: bounce 1.4s infinite;
  }
  .msg.typing span:nth-child(1) {
    animation-delay: 0s;
  }
  .msg.typing span:nth-child(2) {
    animation-delay: 0.2s;
  }
  .msg.typing span:nth-child(3) {
    animation-delay: 0.4s;
  }
  @keyframes bounce {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
`;
document.head.appendChild(style);

</script>
